# =============================================================================
# UbuntuInit — 默认配置文件
# =============================================================================
# 文件        : config/default.conf
# 说明        : 所有配置变量的默认值声明（禁止在此文件中写业务逻辑）
#
# 使用方法:
#   1. 复制 custom.conf.example 为 custom.conf
#   2. 在 custom.conf 中覆盖需要修改的变量
#   3. 此文件不应被直接修改（版本控制保护）
#
# 变量命名规范:
#   UBINIT_<分类>_<名称>
#   所有布尔值使用 "true"/"false" 字符串
# =============================================================================

# =============================================================================
# 全局行为
# =============================================================================

# 遇到模块失败是否立即终止（false = 记录失败并继续执行其他模块）
UBINIT_STOP_ON_ERROR="false"

# 日志文件路径
UBINIT_LOG_FILE="/var/log/ubuntu-init.log"

# 日志级别: DEBUG | INFO | WARNING | ERROR
UBINIT_LOG_LEVEL="INFO"

# 备份目录（SSH 等配置自动备份到此处）
UBINIT_BACKUP_DIR="/var/backup/ubuntu-init"

# 工作目录（临时文件、下载等）
UBINIT_WORK_DIR="/tmp/ubuntu-init"

# =============================================================================
# 系统基础 (module: system)
# =============================================================================

# 是否执行 apt-get update
UBINIT_SYSTEM_APT_UPDATE="true"

# 是否执行 apt-get upgrade
UBINIT_SYSTEM_APT_UPGRADE="true"

# 是否执行 apt-get autoremove
UBINIT_SYSTEM_AUTOREMOVE="true"

# 是否执行 apt-get autoclean
UBINIT_SYSTEM_AUTOCLEAN="true"

# 时区设置（留空则不修改）
# 示例: Asia/Shanghai | America/New_York | UTC
UBINIT_SYSTEM_TIMEZONE="Asia/Shanghai"

# NTP 服务器（空格分隔，留空则不修改）
UBINIT_SYSTEM_NTP_SERVERS="ntp.aliyun.com ntp1.aliyun.com time1.cloud.tencent.com"

# Locale 设置
UBINIT_SYSTEM_LOCALE="en_US.UTF-8"

# Hostname 设置（留空则不修改）
UBINIT_SYSTEM_HOSTNAME=""

# =============================================================================
# 软件源 (module: mirror)
# =============================================================================

# 是否更换 APT 软件源
UBINIT_MIRROR_ENABLE="false"

# 镜像源选择: aliyun | tencent | huawei | ustc | tsinghua | official
UBINIT_MIRROR_APT="aliyun"

# 是否配置 Snap 镜像（仅中国区有效）
UBINIT_MIRROR_SNAP="false"

# =============================================================================
# SSH 配置 (module: ssh)
# =============================================================================

# 是否执行 SSH 配置
UBINIT_SSH_ENABLE="true"

# SSH 监听端口（22 = 不修改）
UBINIT_SSH_PORT="22"

# 是否允许 root 登录: yes | no | prohibit-password
UBINIT_SSH_PERMIT_ROOT_LOGIN="prohibit-password"

# 是否允许密码认证
UBINIT_SSH_PASSWORD_AUTH="no"

# 是否允许公钥认证
UBINIT_SSH_PUBKEY_AUTH="yes"

# 最大认证失败次数
UBINIT_SSH_MAX_AUTH_TRIES="3"

# 空闲超时时间（秒，0 = 不限制）
UBINIT_SSH_CLIENT_ALIVE_INTERVAL="300"

# =============================================================================
# 用户管理 (module: user)
# =============================================================================

# 是否创建管理员用户
UBINIT_USER_CREATE="false"

# 管理员用户名
UBINIT_USER_NAME="ubuntu"

# 是否添加到 sudo 组
UBINIT_USER_SUDO="true"

# authorized_keys 内容（留空则跳过）
UBINIT_USER_AUTHORIZED_KEYS=""

# authorized_keys 文件路径（从文件导入，优先级低于上方变量）
UBINIT_USER_AUTHORIZED_KEYS_FILE=""

# =============================================================================
# 安全加固 (module: security)
# =============================================================================

# 是否配置 UFW 防火墙
UBINIT_SECURITY_UFW="true"

# UFW 默认策略: allow | deny | reject
UBINIT_SECURITY_UFW_DEFAULT_INCOMING="deny"
UBINIT_SECURITY_UFW_DEFAULT_OUTGOING="allow"

# UFW 允许端口列表（空格分隔）
UBINIT_SECURITY_UFW_ALLOW_PORTS="22 80 443"

# 是否安装 Fail2ban
UBINIT_SECURITY_FAIL2BAN="true"

# Fail2ban SSH 最大尝试次数
UBINIT_SECURITY_FAIL2BAN_MAXRETRY="5"

# Fail2ban 封禁时长（秒）
UBINIT_SECURITY_FAIL2BAN_BANTIME="3600"

# 是否应用 sysctl 安全优化
UBINIT_SECURITY_SYSCTL="true"

# 是否配置 ulimit
UBINIT_SECURITY_ULIMIT="true"

# 是否启用自动安全更新
UBINIT_SECURITY_AUTO_UPDATE="true"

# =============================================================================
# 网络工具 (module: nettools)
# =============================================================================

# 是否安装网络工具集
UBINIT_NETTOOLS_ENABLE="true"

# 工具列表（空格分隔，从此列表安装）
UBINIT_NETTOOLS_PACKAGES="curl wget git vim nano btop htop tmux screen tree jq iftop iperf3 nmap tcpdump traceroute mtr net-tools dnsutils lsof unzip zip"

# =============================================================================
# 系统优化 (module: optimize)
# =============================================================================

# 是否启用 BBR 拥塞控制
UBINIT_OPTIMIZE_BBR="true"

# 是否应用 TCP 优化（sysctl）
UBINIT_OPTIMIZE_TCP="true"

# 是否配置 Swap
UBINIT_OPTIMIZE_SWAP="true"

# Swap 大小（如 2G、4G，留空则自动计算为内存的 1x）
UBINIT_OPTIMIZE_SWAP_SIZE=""

# 是否优化 IO 调度器
UBINIT_OPTIMIZE_IO_SCHEDULER="true"

# 是否优化 CPU Governor（performance | powersave | schedutil）
UBINIT_OPTIMIZE_CPU_GOVERNOR="schedutil"

# 是否更新 limits.conf
UBINIT_OPTIMIZE_LIMITS="true"

# =============================================================================
# Docker (module: docker)
# =============================================================================

# 是否安装 Docker
UBINIT_DOCKER_ENABLE="false"

# Docker 安装源: official | aliyun | tencent
UBINIT_DOCKER_REGISTRY_MIRROR_SOURCE="aliyun"

# Docker 镜像加速地址（自定义，留空则根据上方源自动设置）
UBINIT_DOCKER_REGISTRY_MIRRORS=""

# 是否安装 Docker Compose Plugin
UBINIT_DOCKER_COMPOSE="true"

# 是否安装 Docker Buildx
UBINIT_DOCKER_BUILDX="true"

# 是否开机自启
UBINIT_DOCKER_AUTOSTART="true"

# 将当前用户加入 docker 组（需要 UBINIT_USER_NAME 已配置）
UBINIT_DOCKER_ADD_USER="true"

# =============================================================================
# 开发环境
# =============================================================================

# --- Python (module: python) ---
UBINIT_PYTHON_ENABLE="false"
# 安装方式: apt | pyenv
UBINIT_PYTHON_METHOD="apt"
# pyenv 版本（method=pyenv 时有效）
UBINIT_PYTHON_VERSION="3.12.0"
# 是否安装 pip
UBINIT_PYTHON_PIP="true"
# 是否安装 venv
UBINIT_PYTHON_VENV="true"

# --- Node.js (module: node) ---
UBINIT_NODE_ENABLE="false"
# 安装方式: nvm | nodesource | apt
UBINIT_NODE_METHOD="nvm"
# Node.js 版本（lts | current | 20 | 22 等）
UBINIT_NODE_VERSION="lts"
# 是否安装 yarn
UBINIT_NODE_YARN="false"
# 是否安装 pnpm
UBINIT_NODE_PNPM="false"

# --- Java (module: java) ---
UBINIT_JAVA_ENABLE="false"
# 安装方式: apt | sdkman
UBINIT_JAVA_METHOD="apt"
# Java 版本（11 | 17 | 21 | 23）
UBINIT_JAVA_VERSION="21"
# JDK 发行版（openjdk | temurin | zulu）
UBINIT_JAVA_DIST="openjdk"

# --- Go (module: go) ---
UBINIT_GO_ENABLE="false"
# Go 版本（latest 或具体版本如 1.22.0）
UBINIT_GO_VERSION="latest"
# GOPATH 目录
UBINIT_GO_PATH="/usr/local/go"

# --- Rust (module: rust) ---
UBINIT_RUST_ENABLE="false"
# rustup 安装目标用户（留空则为当前用户）
UBINIT_RUST_USER=""

# =============================================================================
# 数据库
# =============================================================================

# --- Redis (module: redis) ---
UBINIT_REDIS_ENABLE="false"
UBINIT_REDIS_PORT="6379"
UBINIT_REDIS_PASSWORD=""
UBINIT_REDIS_MAXMEMORY="256mb"
UBINIT_REDIS_MAXMEMORY_POLICY="allkeys-lru"

# --- MariaDB (module: mariadb) ---
UBINIT_MARIADB_ENABLE="false"
UBINIT_MARIADB_ROOT_PASSWORD=""
UBINIT_MARIADB_PORT="3306"
# 是否运行 mysql_secure_installation 等效安全配置
UBINIT_MARIADB_SECURE="true"

# --- MySQL (module: mysql) ---
UBINIT_MYSQL_ENABLE="false"
UBINIT_MYSQL_ROOT_PASSWORD=""
UBINIT_MYSQL_PORT="3306"
UBINIT_MYSQL_SECURE="true"

# --- PostgreSQL (module: postgresql) ---
UBINIT_POSTGRESQL_ENABLE="false"
UBINIT_POSTGRESQL_VERSION="16"
UBINIT_POSTGRESQL_PORT="5432"
UBINIT_POSTGRESQL_USER="postgres"
UBINIT_POSTGRESQL_PASSWORD=""
UBINIT_POSTGRESQL_DB="postgres"

# --- MongoDB (module: mongodb) ---
UBINIT_MONGODB_ENABLE="false"
UBINIT_MONGODB_VERSION="7.0"
UBINIT_MONGODB_PORT="27017"
UBINIT_MONGODB_AUTH="true"
UBINIT_MONGODB_USER="admin"
UBINIT_MONGODB_PASSWORD=""

# =============================================================================
# Web 服务器
# =============================================================================

# --- Nginx (module: nginx) ---
UBINIT_NGINX_ENABLE="false"
# 安装源: apt | official
UBINIT_NGINX_SOURCE="official"

# --- Apache (module: apache) ---
UBINIT_APACHE_ENABLE="false"

# --- Caddy (module: caddy) ---
UBINIT_CADDY_ENABLE="false"

# --- OpenResty (module: openresty) ---
UBINIT_OPENRESTY_ENABLE="false"

# =============================================================================
# 监控
# =============================================================================

# --- Netdata (module: netdata) ---
UBINIT_NETDATA_ENABLE="false"
UBINIT_NETDATA_PORT="19999"

# --- Prometheus Node Exporter (module: node_exporter) ---
UBINIT_NODE_EXPORTER_ENABLE="false"
UBINIT_NODE_EXPORTER_PORT="9100"
UBINIT_NODE_EXPORTER_VERSION="latest"

# --- Grafana Agent (module: grafana) ---
UBINIT_GRAFANA_AGENT_ENABLE="false"

# =============================================================================
# Shell 环境 (module: shell)
# =============================================================================

# 是否安装 zsh
UBINIT_SHELL_ZSH="false"

# 是否安装 Oh My Zsh
UBINIT_SHELL_OH_MY_ZSH="false"

# 是否安装 starship 提示符
UBINIT_SHELL_STARSHIP="false"

# 是否安装 fastfetch
UBINIT_SHELL_FASTFETCH="true"

# 是否安装 bash-completion
UBINIT_SHELL_BASH_COMPLETION="true"

# =============================================================================
# 日志管理 (module: log_mgmt)
# =============================================================================

# 是否配置 journald
UBINIT_LOG_JOURNALD="true"

# journald 最大存储（如 500M | 1G）
UBINIT_LOG_JOURNALD_MAX_SIZE="500M"

# journald 最大保留天数
UBINIT_LOG_JOURNALD_MAX_DAYS="30"

# 是否配置 logrotate
UBINIT_LOG_LOGROTATE="true"

# =============================================================================
# 目录初始化 (module: directories)
# =============================================================================

# 是否自动创建标准目录
UBINIT_DIRS_ENABLE="true"

# 要创建的目录列表（空格分隔）
UBINIT_DIRS_LIST="/data /docker /backup /scripts /logs"

# 目录所有者（留空则为 root）
UBINIT_DIRS_OWNER="root"

# 目录权限（八进制）
UBINIT_DIRS_MODE="0755"
